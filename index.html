<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Voice Input Demo</title>
  <style>
    body { font-family: sans-serif; display: flex; flex-direction: column; align-items: center; justify-content: center; height: 100vh; margin: 0; background-color: #f4f4f9; }
    button { font-size: 24px; padding: 20px 40px; border-radius: 50px; background-color: #4CAF50; color: white; border: none; cursor: pointer; box-shadow: 0 4px 6px rgba(0,0,0,0.1); transition: 0.2s; }
    button.recording { background-color: #f44336; animation: pulse 1.5s infinite; }
    #status { margin-top: 20px; font-size: 18px; color: #333; text-align: center; padding: 0 20px;}
    @keyframes pulse { 0% { transform: scale(1); } 50% { transform: scale(1.05); } 100% { transform: scale(1); } }
  </style>
</head>
<body>

  <button id="micBtn">🎤 Start Speaking</button>
  <p id="status">Tap the microphone to begin.</p>

  <script>
    const micBtn = document.getElementById('micBtn');
    const statusText = document.getElementById('status');
    
    // Setup Speech Recognition
    const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;
    const recognition = new SpeechRecognition();
    recognition.continuous = false;
    recognition.interimResults = false;

    micBtn.addEventListener('click', () => {
      recognition.start();
      micBtn.classList.add('recording');
      micBtn.innerText = "🛑 Recording...";
      statusText.innerText = "Listening... Speak clearly.";
    });

    recognition.onresult = (event) => {
      const transcript = event.results[0][0].transcript;
      statusText.innerText = "Processing: " + transcript;
      
      // Grab the Row ID from the AppSheet URL
      const urlParams = new URLSearchParams(window.location.search);
      const rowId = urlParams.get('rowId') || "No_ID_Provided";

      // The exact pre-filled link
      let formUrl = "https://docs.google.com/forms/d/e/1FAIpQLScm3Ybfa0VptzYRvNgcqusbhKwUpKAuze7JHPb6GnLJAbhc-g/viewform?usp=pp_url&entry.134202282=TEST_ID&entry.138727830=TEST_TEXT";
      
      // Swap our placeholder words with the actual data
      formUrl = formUrl.replace("TEST_ID", encodeURIComponent(rowId));
      formUrl = formUrl.replace("TEST_TEXT", encodeURIComponent(transcript));

      statusText.innerText = "Redirecting to official form...";
      
      // Redirect the user straight to the Google Form!
      window.location.href = formUrl;
    };

    recognition.onspeechend = () => {
      recognition.stop();
      micBtn.classList.remove('recording');
      micBtn.innerText = "🎤 Start Speaking";
    };

    recognition.onerror = (event) => {
      statusText.innerText = "Microphone error: " + event.error;
      micBtn.classList.remove('recording');
      micBtn.innerText = "🎤 Start Speaking";
    };
  </script>

</body>
</html>
